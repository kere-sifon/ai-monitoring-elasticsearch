# Elasticsearch Helm values for AI Monitoring
# Install: helm install elasticsearch bitnami/elasticsearch -n ai-monitoring -f deployments/elasticsearch-values.yaml

fullnameOverride: elasticsearch

image:
  repository: bitnamilegacy/elasticsearch
  tag: "9.1.2-debian-12-r0"
volumePermissions:
  image:
    repository: bitnamilegacy/os-shell
    tag: "12-debian-12-r50"
# Disable privileged sysctl init (sets vm.max_map_count); it breaks PodSecurity "restricted"
# (privileged/root). Ensure nodes satisfy Elasticsearch (e.g. vm.max_map_count >= 262144) via
# MachineConfig / Node Tuning Operator on OpenShift, or tune at the host level.
sysctlImage:
  enabled: false
  repository: bitnamilegacy/os-shell
  tag: "12-debian-12-r50"

master:
  # Required for single-node: master must hold data when data.replicaCount is 0 (default chart value is masterOnly: true).
  masterOnly: false
  replicaCount: 1
  persistence:
    enabled: true
    size: 4Gi
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

data:
  replicaCount: 0
coordinating:
  replicaCount: 0
ingest:
  replicaCount: 0

kibanaEnabled: false

security:
  enabled: true
  existingSecret: ai-monitoring-secrets
  tls:
    autoGenerated: true
    restEncryption: true
    verificationMode: "none"
